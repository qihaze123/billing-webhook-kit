name: Site Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    types: [completed]

permissions:
  contents: read

jobs:
  health:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check public artifact integrity
        run: npm run health:artifacts
      - name: Check public site health
        run: npm run health:site
